name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore .\Speakly.sln

      - name: Build
        run: dotnet build .\Speakly.sln -c Release --no-restore

      - name: Unit Tests + Coverage Gate
        run: >
          dotnet test .\Speakly.Tests.Unit\Speakly.Tests.Unit.csproj
          -c Release
          --no-build
          --logger "trx;LogFileName=unit-tests.trx"
          /p:CollectCoverage=true
          /p:CoverletOutput=.\TestResults\coverage\
          /p:CoverletOutputFormat=cobertura
          /p:ThresholdType=line%2cbranch
          /p:Threshold=5%2c4
          /p:ThresholdStat=total

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **\TestResults\*.trx
            **\TestResults\coverage\coverage.cobertura.xml
